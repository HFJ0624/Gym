# 配置服务端口号
server:
  port: 9601

# 配置数据库连接信息 url需要改成自己的虚拟机ip地址192.168.10.100
spring:
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://192.168.10.100:3306/gym?characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 1234

    # Redis的相关配置
    data:
      redis:
        host: 192.168.10.100
        port: 6379
  #  password: 1234
  mail:
    host: smtp.qq.com # 指定邮件服务器的主机名，这里默认是smtp.qq.com，表示使用的是腾讯的SMTP服务器。
    port: 465 # 456也行
    username: "342586916@qq.com" # xxxx@qq.com  这里是发送者
    password: "hsgisvcnnkxbbijh"  # 这里就是我前面提到的授权码了
    properties:
      mail:
        smtp:
          auth: true
          ssl: true           # 开启SSL
          starttls: false     # 必须关闭！和SSL冲突
          socketFactory:
            port: 465
            class: javax.net.ssl.SSLSocketFactory
            fallback: false
    default-encoding: UTF-8 # 设置邮件内容的默认编码格式为UTF-8 默认就是UTF-8
    protocol: smtp

# mybatis的配置
mybatis:
  config-location: classpath:/mybatis-config.xml
  mapper-locations: classpath:/mapper/*/*.xml

# 自定义配置 访问权限路由配置
gym:
  auth:
    noAuthUrls:
      - /admin/system/index/login
      - /admin/system/index/generateValidateCode
      - /admin/system/user/register
      - /admin/system/fileUpload
      - /front/login
      - /front/register
      - /front/generateValidateCode
      - /admin/system/index/sendCode/**
      - /admin/system/email/sendEmail
      # 新增 Swagger 相关路径
      - /swagger-ui.html
      - /swagger-ui/**
      - /v3/api-docs/**
      - /v2/api-docs/**          # 如果使用 Swagger2
      - /swagger-resources/**
      - /webjars/**
      - /doc.html                # 如果使用 Knife4j
      - /error                   # 可选，避免错误页面被拦截
  minio:
    endpointUrl: http://192.168.10.100:9001
    accessKey: admin
    secreKey: admin123456
    bucketName: gym-bucket